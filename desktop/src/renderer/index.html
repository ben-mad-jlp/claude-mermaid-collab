<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mermaid Collab</title>
    <style>
      :root {
        --bg: #0f1419;
        --fg: #e6edf3;
        --muted: #8b949e;
        --accent: #3fb6a8;
        --danger: #f0816f;
        --panel: #161b22;
        --border: #30363d;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-user-select: none;
        user-select: none;
      }
      .stage { text-align: center; max-width: 560px; padding: 32px; }

      /* Brand mark — a stylized whale/diamond drawn in CSS so we depend on no asset. */
      .mark {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), #2b8a80);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 8px 28px rgba(63, 182, 168, 0.25);
      }
      .title { font-size: 18px; font-weight: 600; letter-spacing: 0.2px; }
      .subtitle { color: var(--muted); margin-top: 6px; }

      .spinner {
        width: 26px;
        height: 26px;
        margin: 22px auto 0;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Error panel — hidden until bootstrap reports a failure. */
      #error { display: none; }
      #error .mark { background: linear-gradient(135deg, var(--danger), #c25c4b); box-shadow: none; }
      #error .title { color: var(--danger); }
      .log-path {
        margin: 16px auto 0;
        padding: 10px 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        color: var(--muted);
        word-break: break-all;
        -webkit-user-select: text;
        user-select: text;
      }
      .detail {
        margin: 12px auto 0;
        max-height: 160px;
        overflow: auto;
        padding: 10px 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        color: var(--muted);
        white-space: pre-wrap;
        text-align: left;
        -webkit-user-select: text;
        user-select: text;
      }
      .detail:empty { display: none; }
      button {
        margin-top: 18px;
        padding: 9px 22px;
        font: inherit;
        font-weight: 600;
        color: #06231f;
        background: var(--accent);
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.08); }
      button:disabled { opacity: 0.5; cursor: default; }

      /* Live startup readout under the spinner — monospace, dim, single line. */
      .status {
        margin: 16px auto 0;
        min-height: 16px;
        max-width: 520px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: opacity 0.2s;
      }
    </style>
  </head>
  <body>
    <div id="loading" class="stage">
      <div class="mark">🐳</div>
      <div class="title">Mermaid Collab</div>
      <div class="subtitle">Starting collaboration server…</div>
      <div class="spinner"></div>
      <!-- Live startup readout — the sidecar's latest log line + elapsed, streamed
           from main via mc:bootstrap-progress so this isn't a bare spinner. -->
      <div class="status" id="status"></div>
    </div>

    <div id="error" class="stage">
      <div class="mark">⚠</div>
      <div class="title">Couldn't start the server</div>
      <div class="subtitle" id="error-message">The bundled collaboration server didn't come up.</div>
      <div class="detail" id="error-detail"></div>
      <div class="log-path" id="error-logpath"></div>
      <button id="retry">Retry</button>
    </div>

    <script>
      // Wired to the `mc` preload bridge. When the main process fails to bring up
      // the sidecar, it sends mc:bootstrap-error with a human message, optional
      // detail (stderr tail), and the log path; we flip to the error panel.
      const loading = document.getElementById('loading');
      const errorPanel = document.getElementById('error');
      const msgEl = document.getElementById('error-message');
      const detailEl = document.getElementById('error-detail');
      const logPathEl = document.getElementById('error-logpath');
      const retryBtn = document.getElementById('retry');
      const statusEl = document.getElementById('status');

      // Live startup info — replaces the bare spinner with what's actually
      // happening (the sidecar's latest log line + elapsed), streamed from main.
      if (window.mc && typeof window.mc.onBootstrapProgress === 'function') {
        window.mc.onBootstrapProgress((info) => {
          if (info && info.message) statusEl.textContent = info.message;
        });
      }

      if (window.mc && typeof window.mc.onBootstrapError === 'function') {
        window.mc.onBootstrapError((info) => {
          if (info && info.message) msgEl.textContent = info.message;
          detailEl.textContent = (info && info.detail) ? info.detail : '';
          logPathEl.textContent = (info && info.logPath) ? 'Log: ' + info.logPath : '';
          loading.style.display = 'none';
          errorPanel.style.display = 'block';
          retryBtn.disabled = false;
        });
      }

      retryBtn.addEventListener('click', () => {
        retryBtn.disabled = true;
        errorPanel.style.display = 'none';
        loading.style.display = 'block';
        statusEl.textContent = '';
        if (window.mc && typeof window.mc.retryBootstrap === 'function') {
          window.mc.retryBootstrap();
        }
      });
    </script>
  </body>
</html>
