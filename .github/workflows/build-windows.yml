name: Build Windows Desktop

# Builds the Windows (NSIS) desktop installer on a native Windows runner — the
# robust path vs. cross-building from macOS (no wine, sidecar compiles natively).
# Produces an UNSIGNED installer (no Windows code-signing cert configured), so
# SmartScreen will warn on first run.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Root deps — needed to compile the Bun sidecar (src/server.ts), incl. the
      # electron-agent-bridge git dependency (public repo, ships built dist/).
      - name: Install root deps
        run: bun install

      - name: Build UI
        working-directory: ui
        run: |
          bun install
          bunx vite build

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build desktop main (electron-vite)
        working-directory: desktop
        run: npm run build

      - name: Compile sidecar (mc-server.exe)
        working-directory: desktop
        run: bun run scripts/build-sidecar.ts

      - name: Package Windows installer (electron-builder)
        working-directory: desktop
        env:
          # No Windows signing cert; build unsigned.
          CSC_IDENTITY_AUTODISCOVERY: 'false'
        run: bunx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-collab-windows
          path: |
            desktop/dist/*.exe
            desktop/dist/*.blockmap
            desktop/dist/latest*.yml
          if-no-files-found: error
