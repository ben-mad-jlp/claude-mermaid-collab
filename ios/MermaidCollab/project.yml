name: MermaidCollab
options:
  bundleIdPrefix: com.mermaidcollab
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
targets:
  MermaidCollab:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Zen
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # LAN-local (v1): cleartext only to local-network endpoints — the Apple-sanctioned
        # exception for local-network apps, NOT the red-flag NSAllowsArbitraryLoads. The
        # bearer token is the gate; v2 adds self-signed TLS + cert pinning (fingerprint slot
        # reserved in Credentials). Covers the sim (localhost) and a device (192.168.x LAN).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Bonjour discovery of the desktop server (design §3). NWBrowser on iOS 14+ requires
        # both the usage description (Local Network permission prompt) and the service list.
        NSLocalNetworkUsageDescription: "Zen finds your Mac on your wifi to show your collab sessions. Nothing leaves your local network."
        NSBonjourServices:
          - _mermaidcollab._tcp
        # Pairing deep link: the desktop "Phone access" QR encodes
        # mermaidcollab://pair?host=…&token=… — scanning it in Camera opens the app.
        CFBundleURLTypes:
          - CFBundleURLName: com.mermaidcollab.app.pair
            CFBundleURLSchemes:
              - mermaidcollab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mermaidcollab.app
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
